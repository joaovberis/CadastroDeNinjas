<!
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tabela de Ninjas</title>
</head>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        background:#f4f6f9;
        padding:40px;
    }

    h1{
        text-align:center;
        margin-bottom:30px;
        color:#333;
    }

    /* TABELA */

    table{
        width:100%;
        border-collapse:collapse;
        background:white;
        border-radius:10px;
        overflow:hidden;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    thead{
        background:#1f2937;
        color:white;
    }

    thead th{
        padding:15px;
        text-align:left;
    }

    tbody td{
        padding:15px;
        border-bottom:1px solid #eee;
    }

    tbody tr:hover{
        background:#f9fafb;
        transition:0.3s;
    }

    /* IMAGEM */

    img{
        border-radius:50%;
        object-fit:cover;
    }

    /* BOTÕES */

    .acoes a{
        text-decoration:none;
        padding:8px 14px;
        border-radius:6px;
        font-size:14px;
        margin-right:5px;
        font-weight:bold;
        transition:0.3s;
    }

    .btn-detalhes{
        background:#2563eb;
        color:white;
    }

    .btn-detalhes:hover{
        background:#1e4ed8;
    }

    .btn-editar{
        background:#f59e0b;
        color:white;
    }

    .btn-editar:hover{
        background:#d97706;
    }

    .btn-deletar{
        background:#ef4444;
        color:white;
    }

    .btn-deletar:hover{
        background:#dc2626;
    }
</style>
<body>
    <h1>Lista de Ninjas</h1>
    <a class="btn-adicionar" th:href="@{/ninjas/ui/adicionar}">Adicionar Novo Ninja</a>
    <table>
        <thead>
            <tr>
                <th>Imagem</th>
                <th>Id</th>
                <th>Nome</th>
                <th>Idade</th>
                <th>Email</th>
                <th>Rank</th>
                <th>Missoes</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each = "ninja: ${ninjas}">

                <td><img th:src="${ninja.imgUrl}" width="100" height="100"></td>
                <td th:text="${ninja.id}"></td>
                <td th:text="${ninja.nome}"></td>
                <td th:text="${ninja.idade}"></td>
                <td th:text="${ninja.email}"></td>
                <td th:text="${ninja.rank}"></td>
                <td>
                    <span th:if="${ninja.missoes}">Nome: <span th:text="${ninja.missoes.nome}"></span>, Dificuldade: <span th:text="${ninja.missoes.dificuldade}"></span></span>
                        <span th:if="${ninja.missoes == null}">Sem Missôes cadastradas para o ninja</span>
                </td>

                <td>
                    <a th:href="@{/ninjas/ui/listar/{id}(id=${ninja.id})}">Ver detalhes</a>
                    <a th:href="@{/ninjas/ui/#/{id}(id=${ninja.id})}">Alterar</a>
                    <a th:href="@{/ninjas/ui/deletar/{id}(id=${ninja.id})}">Deletar</a>
                </td>

            </tr>
        </tbody>
    </table>

</body>
</html>
